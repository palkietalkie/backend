name: Backend CI

on:
  # Run tests on PRs to verify code doesn't break before merge
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.sh"
      - "**.xml"
      - "**.gitignore"
      - "Dockerfile"
      - "CODEOWNERS"
      - "LICENSE"
      - ".github/workflows/deploy-api.yml"
  # Run tests after merge to capture canonical coverage on main
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.sh"
      - "**.xml"
      - "**.gitignore"
      - "Dockerfile"
      - "CODEOWNERS"
      - "LICENSE"
      - ".github/workflows/deploy-api.yml"
  # Allow manual trigger for debugging
  workflow_dispatch:

# Cancel older runs when new commits are pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  test-pair:
    name: Refuse source changes without paired test changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - run: bash scripts/ci/check_test_pair.sh "origin/${{ github.base_ref }}"

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check app/ inference/ scripts/ migrations/ conftest.py

      - name: Ruff lint
        run: ruff check app/ inference/ scripts/ migrations/ conftest.py

  pyright:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Pyright
        run: pyright

  pytest:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest with coverage gate
        env:
          APP_ENV: test
          CLERK_JWKS_URL: "https://test.clerk.test/.well-known/jwks.json"
          CLERK_ISSUER: "https://test.clerk.test"
          STRIPE_WEBHOOK_SECRET: whsec_test_secret
          # Sandbox creds for the webhook tests in app/routers/webhooks/. backend/.env values are dev/sandbox; GH Secret names match .env names exactly so there's no translation layer.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_INDIVIDUAL_MONTHLY: ${{ secrets.STRIPE_PRICE_INDIVIDUAL_MONTHLY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          GEMINI_API_KEY: test-gemini-key
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_STOREKIT_ISSUER_ID: ${{ secrets.APPLE_STOREKIT_ISSUER_ID }}
          APPLE_STOREKIT_KEY_ID: ${{ secrets.APPLE_STOREKIT_KEY_ID }}
          APPLE_STOREKIT_PRIVATE_KEY: ${{ secrets.APPLE_STOREKIT_PRIVATE_KEY }}
          APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_PRIVATE_KEY: ${{ secrets.APPLE_ASC_PRIVATE_KEY }}
          PERSONAPLEX_HOST: personaplex.test
          PERSONAPLEX_PORT: "443"
          PERSONAPLEX_SCHEME: wss
          GOOGLE_OAUTH_CLIENT_ID: test-google-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: test-google-client-secret
          NEO4J_URI: "bolt://localhost:7687"
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
