name: Backend CI

on:
  # Run tests on PRs to verify code doesn't break before merge
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.sh"
      - "**.xml"
      - "**.gitignore"
      - "Dockerfile"
      - "CODEOWNERS"
      - "LICENSE"
      - ".github/workflows/deploy-api.yml"
  # Run tests after merge to capture canonical coverage on main
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.sh"
      - "**.xml"
      - "**.gitignore"
      - "Dockerfile"
      - "CODEOWNERS"
      - "LICENSE"
      - ".github/workflows/deploy-api.yml"
  # Allow manual trigger for debugging
  workflow_dispatch:

# Cancel older runs when new commits are pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check app/ inference/ scripts/ migrations/ conftest.py

      - name: Ruff lint
        run: ruff check app/ inference/ scripts/ migrations/ conftest.py

  pyright:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Pyright
        run: pyright

  pytest:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest with coverage gate
        env:
          # conftest.py spins up Postgres via testcontainers and overrides NEON_DATABASE_URL; the rest of these are read by Settings at import time.
          APP_ENV: test
          CLERK_JWKS_URL: "https://test.clerk.test/.well-known/jwks.json"
          CLERK_ISSUER: "https://test.clerk.test"
          STRIPE_WEBHOOK_SECRET: whsec_test_secret
          STRIPE_SECRET_KEY: sk_test_dummy
          GEMINI_API_KEY: test-gemini-key
          APPLE_BUNDLE_ID: ai.palkietalkie.test
          PERSONAPLEX_HOST: personaplex.test
          PERSONAPLEX_PORT: "443"
          PERSONAPLEX_SCHEME: wss
          GOOGLE_OAUTH_CLIENT_ID: test-google-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: test-google-client-secret
          NEO4J_URI: "bolt://localhost:7687"
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
