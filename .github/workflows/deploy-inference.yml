name: Deploy inference

on:
  push:
    branches: [main]
    paths:
      - "inference/**"
      - ".github/workflows/deploy-inference.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Modal
        run: uv pip install --system "modal>=0.66"

      - name: Deploy voice
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy inference/voice_app.py
