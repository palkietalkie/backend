# Palkie Talkie backend on Fly.io — DEV config.
# Deploy with `flyctl deploy --config fly.dev.toml -a palkietalkie-api-dev`.
# Same shape as fly.toml; differs only in `[env]` values that are env-specific.
app = "palkietalkie-api-dev"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config. Keep CREDENTIALS in `flyctl secrets`; URLs / hostnames / public IDs / model names live here.
[env]
  APP_ENV = "development"
  LOG_LEVEL = "INFO"
  CORS_ORIGINS = "https://palkietalkie.com,http://localhost:3030"
  PINECONE_INDEX = "palkietalkie-dev"
  CLERK_JWKS_URL = "https://cute-tick-41.clerk.accounts.dev/.well-known/jwks.json"
  CLERK_ISSUER = "https://cute-tick-41.clerk.accounts.dev"
  APPLE_BUNDLE_ID = "com.palkietalkie.app"
  INFERENCE_PROVIDER = "openai"
  APNS_USE_SANDBOX = "true"
  PERSONAPLEX_HOST = "palkietalkie-dev--api.modal.run"
  PERSONAPLEX_PORT = "443"
  PERSONAPLEX_SCHEME = "wss"
  GOOGLE_OAUTH_REDIRECT_URI = "https://palkietalkie-api-dev.fly.dev/integrations/google-calendar/callback"
  NEO4J_URI = "neo4j+s://a2e098ec.databases.neo4j.io"
  NEO4J_USER = "a2e098ec"
  NEO4J_DATABASE = "a2e098ec"
  SLACK_CHANNEL_GTM = "C0B8R2H1E8H"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
