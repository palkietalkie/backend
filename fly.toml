# Palkie Talkie backend on Fly.io — PRD config.
# Region sjc co-locates with Lambda Labs us-west-1 (where PersonaPlex runs) for low RTT.
# Dev deploys with `--config fly.dev.toml`.
app = "palkietalkie-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config. Keep CREDENTIALS in `flyctl secrets`; URLs / hostnames / public IDs / model names live here.
[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  CORS_ORIGINS = "https://palkietalkie.com"
  PINECONE_INDEX = "palkietalkie"
  CLERK_JWKS_URL = "https://clerk.palkietalkie.com/.well-known/jwks.json"
  CLERK_ISSUER = "https://clerk.palkietalkie.com"
  APPLE_BUNDLE_ID = "com.palkietalkie.app"
  INFERENCE_PROVIDER = "openai"
  APNS_USE_SANDBOX = "false"
  PERSONAPLEX_HOST = "palkietalkie--api.modal.run"
  PERSONAPLEX_PORT = "443"
  PERSONAPLEX_SCHEME = "wss"
  GOOGLE_OAUTH_REDIRECT_URI = "https://palkietalkie-api.fly.dev/integrations/google-calendar/callback"
  NEO4J_URI = "neo4j+s://799b72e4.databases.neo4j.io"
  NEO4J_USER = "799b72e4"
  NEO4J_DATABASE = "799b72e4"
  SLACK_CHANNEL_GTM = "C0B8R2H1E8H"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # 512MB OOM'd with 2 uvicorn workers + spaCy + SDKs imported. 1024 fits comfortably with 1 worker; can drop back to 512 if we lazy-load spaCy.
  memory_mb = 1024
